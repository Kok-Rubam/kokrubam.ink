<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{% block title %}kokrubam — Kokborok-English Dictionary{% endblock %}</title>
    <meta name="description" content="{% block description %}kokrubam — Free and open source Kokborok-English dictionary by Bishnu Charan Debbarma{% endblock %}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a6b3c" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="wrap {% block bodyclass %}{% endblock %}">
        <header>
            <div class="logo-area">
                <a href="/" class="logo" title="kokrubam: Kokborok-English dictionary">
                    <span class="logo-text">kokrubam</span>
                </a>
                <div class="taglines">
                    <p>Kokborok-English Dictionary</p>
                    <p class="sub">By Bishnu Charan Debbarma</p>
                </div>
            </div>

            <form class="search-form" action="/dictionary/kokborok/english" method="get">
                <div class="search-input">
                    <input type="search" name="q" value="{{ query | default(value='') }}"
                        placeholder="Search Kokborok words..."
                        autofocus />
                    <button type="submit" class="search-btn">Search</button>
                </div>
            </form>
        </header>

        {% block content %}{% endblock %}

        <nav class="nav">
            <a href="/">Home</a>
            <a href="/glossary/kokborok/english/A">Glossary</a>
            <a href="/page/about">About</a>
        </nav>

        <footer>
            <p>Dictionary by <strong>Bishnu Charan Debbarma</strong>.</p>
            <p>Built with <a href="https://github.com/knadh/dictpress" target="_blank">dictpress</a>.
               Source on <a href="https://github.com/Kok-Rubam/kokrubam.ink" target="_blank">GitHub</a>.</p>
        </footer>
    </div>
</body>
</html>
